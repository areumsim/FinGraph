# (VehicleModel) -[:MANUFACTURED_AT]-> (Plant) 시드.
#
# PRD §10.5 / DoD #5 (BOM Level 1 안정) 보조. plants.yaml 의 :Plant 노드를 그대로
# 참조 (code 기준). 각 매핑은 공개 IR / Wikipedia / 회사 홈페이지에 기반.
#
# 정책:
#   - 매핑 1건 = (model_name_norm, plant_code, manufacturer_name, valid_from)
#   - confidence 0.90 (공개 자료 deterministic — PRD §3.5 B 등급+).
#   - validated_status='validated' (manual seed — `manual_curation' 출처).
#   - 한 모델이 여러 공장에서 생산되면 같은 모델로 여러 row 작성 (manufactured_at 은
#     many-to-many 이므로 그래프에 모두 적재).
#
# 주의: model_name 은 NHTSA vPIC 표기 (영문, 모든 대문자 가능) 기준. loader 가
# auto.master_vehicle_models 와 normalize 매칭 (대소문자 무시, 공백 제거).

