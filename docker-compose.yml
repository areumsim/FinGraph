# FinGraph DB 스택 — PostgreSQL + Neo4j (minimal)
#
# 벡터: pgvector 확장 (init SQL 에서 자동 활성화) → Qdrant 별도 X.
# 캐싱/Redis: 단일 worker 단계엔 in-process 디셔너리. 분산 가면 추가.
# GPU (BGE-M3/Reranker): 후속 PR, 주석으로 슬롯 예약.
#
# === 사용법 ===
# 전체:        docker compose up -d
# 개별:        docker compose up -d postgres
#              docker compose up -d neo4j
# 종료:        docker compose down
# 로그:        docker compose logs -f --tail=100 [service]
#
# 상세:        docs/operations/docker_setup.md
#
# === Port 매핑 (외부 31xxx — dev 컨테이너 31001~31008 과 충돌 회피) ===
#   호스트         컨테이너 안
#   31009     ─→   7474    Neo4j HTTP browser
#   31010     ─→   7687    Neo4j Bolt
#   31011     ─→   5432    PostgreSQL
#   31015     ─→   8080    BGE-M3 임베딩 (예약)
#   31016     ─→   8081    BGE-Reranker (예약)
#
# === 볼륨 매핑 (bind mount — 호스트에서 직접 백업·점검 가능) ===
# DB_DATA_ROOT 는 .env 또는 환경변수. 기본 /home/user/arsim/DB_FG.
# 호스트 경로 vs 컨테이너 내부 경로를 혼동하지 말 것:
#
#   PostgreSQL
#     호스트:    ${DB_DATA_ROOT}/postgres/
#     컨테이너:  /var/lib/postgresql/data
#                (PGDATA 가 .../data/pgdata 라서 실제 데이터는
#                 호스트 ${DB_DATA_ROOT}/postgres/pgdata/ 에 생성됨)
#     init SQL: ./infra/postgres/init/*.sql → /docker-entrypoint-initdb.d/ (read-only)
#
#   Neo4j
#     호스트                                 컨테이너
#     ${DB_DATA_ROOT}/neo4j/data        ─→  /data
#     ${DB_DATA_ROOT}/neo4j/logs        ─→  /logs
#     ${DB_DATA_ROOT}/neo4j/import      ─→  /var/lib/neo4j/import
#     ${DB_DATA_ROOT}/neo4j/plugins     ─→  /plugins
#
# === 접속 경로 (.env) ===
# 외부(dev 컨테이너에서 호스트로):  192.168.88.201:31xxx
# 같은 docker network join 시:     컨테이너명(ar-postgres / ar-neo4j) + 내부 포트

name: autonexusgraph

services:

  postgres:
    # pgvector 가 미리 컴파일된 공식 이미지 (PG 16 + vector 확장).
    # Alpine 대신 일반 Debian 베이스 — 의존성 더 풍부, 크기 살짝↑ (~200MB).
    image: pgvector/pgvector:pg16
    container_name: ar-postgres
    restart: unless-stopped
    ports:
      - "31011:5432"     # 호스트 : 컨테이너
    environment:
      POSTGRES_USER: autonexusgraph
      POSTGRES_PASSWORD: autonexusgraph_dev
      POSTGRES_DB: autonexusgraph
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      # 호스트 ${DB_DATA_ROOT}/postgres  →  컨테이너 /var/lib/postgresql/data
      # (실 데이터는 PGDATA 환경변수 때문에 호스트의 .../postgres/pgdata 아래 생성)
      - ${DB_DATA_ROOT:-/home/user/arsim/DB_FG}/postgres:/var/lib/postgresql/data
      # init SQL — 빈 볼륨 첫 기동 시 자동 적용. pgvector 확장 + 스키마 생성.
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    networks: [autonexusgraph_net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autonexusgraph -d autonexusgraph"]
      interval: 10s
      timeout: 5s
      retries: 10

  neo4j:
    # 5.18 community — APOC 만 포함, GDS 미포함 (GDS 필요 시 enterprise 또는 별도)
    image: neo4j:5.18-community
    container_name: ar-neo4j
    restart: unless-stopped
    ports:
      - "31009:7474"     # 호스트 31009 → 컨테이너 7474 (HTTP browser)
      - "31010:7687"     # 호스트 31010 → 컨테이너 7687 (Bolt)
    environment:
      NEO4J_AUTH: "neo4j/autonexusgraph_dev"
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_heap_initial__size: "512m"
      NEO4J_dbms_memory_heap_max__size: "2g"
      NEO4J_dbms_memory_pagecache_size: "1g"
    volumes:
      # 호스트 → 컨테이너 (각각 매핑 다름)
      - ${DB_DATA_ROOT:-/home/user/arsim/DB_FG}/neo4j/data:/data
      - ${DB_DATA_ROOT:-/home/user/arsim/DB_FG}/neo4j/logs:/logs
      - ${DB_DATA_ROOT:-/home/user/arsim/DB_FG}/neo4j/import:/var/lib/neo4j/import
      - ${DB_DATA_ROOT:-/home/user/arsim/DB_FG}/neo4j/plugins:/plugins
    networks: [autonexusgraph_net]
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ─────────────────────────────────────────────────────────────────
  # GPU 임베딩 (BGE-M3 / Reranker)
  #
  # 옵션 1) 별도 컨테이너 (TEI) — 아래 주석 해제.
  #   호스트에 NVIDIA Container Toolkit 필요, 31015/31016 외부 포트.
  # bge-m3:
  #   image: ghcr.io/huggingface/text-embeddings-inference:1.2
  #   container_name: ar-bge-m3
  #   command: --model-id BAAI/bge-m3 --port 8080
  #   ports: ["31015:8080"]
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - { driver: nvidia, count: 1, capabilities: [gpu] }
  #   networks: [autonexusgraph_net]
  # bge-reranker:
  #   image: ghcr.io/huggingface/text-embeddings-inference:1.2
  #   container_name: ar-bge-reranker
  #   command: --model-id BAAI/bge-reranker-v2-m3 --port 8081
  #   ports: ["31016:8081"]
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - { driver: nvidia, count: 1, capabilities: [gpu] }
  #   networks: [autonexusgraph_net]
  #
  # 옵션 2) dev container 안에서 직접 (현 환경 권장 — docker-in-docker 불필요)
  #   dev 컨테이너에 GPU 마운트되어 있으므로 (CUDA_VISIBLE_DEVICES=1,3),
  #   sentence-transformers 로 BGE-M3 로드 → FastAPI 로 HTTP 노출.
  #   실행:
  #     pip install -e ".[ui,llm]" sentence-transformers
  #     python scripts/serve_embeddings.py --port 8080
  #   .env 의 EMBEDDING_URL=http://localhost:8080 그대로 사용.

  # ─────────────────────────────────────────────────────────────────
  # FinGraph 앱 서비스 (src/) — 현재 dev 환경에서 직접 실행 중. 컨테이너화는 후속.
  # 동일 스펙 (Python 3.11, src/ 마운트, 같은 autonexusgraph_net) 으로 띄울 슬롯.
  #
  # api:
  #   build:
  #     context: .
  #     dockerfile: infra/Dockerfile
  #   container_name: ar-autonexusgraph-api
  #   command: ["uvicorn", "autonexusgraph.api.main:app", "--host", "0.0.0.0", "--port", "8000"]
  #   ports: ["31020:8000"]
  #   env_file: .env
  #   volumes:
  #     - ./src:/app/src:ro
  #     - ./scripts:/app/scripts:ro
  #     - ${DB_DATA_ROOT:-/home/user/arsim/DB_FG}/cache:/app/cache
  #   networks: [autonexusgraph_net]
  #   depends_on: [postgres, neo4j]
  #
  # web:
  #   build: { context: ., dockerfile: infra/Dockerfile }
  #   container_name: ar-autonexusgraph-web
  #   command: ["streamlit", "run", "src/autonexusgraph/ui/app.py", "--server.port", "8501"]
  #   ports: ["31021:8501"]
  #   env_file: .env
  #   volumes: [./src:/app/src:ro]
  #   networks: [autonexusgraph_net]
  #   depends_on: [api]
  #
  # ingestion-worker:
  #   build: { context: ., dockerfile: infra/Dockerfile }
  #   container_name: ar-autonexusgraph-ingest
  #   command: ["python", "-m", "autonexusgraph.workers.ingest"]
  #   env_file: .env
  #   volumes:
  #     - ./src:/app/src:ro
  #     - ./data:/app/data
  #   networks: [autonexusgraph_net]
  #   depends_on: [postgres, neo4j]
  #   restart: "no"

  # ── 옵션: Qdrant (벡터 검색 스케일 ↑ 필요 시) ────────────────────
  # 청크 100만 넘으면 pgvector 보다 빠름. 그 전까지는 PG vector 로 충분.
  # qdrant:
  #   image: qdrant/qdrant:v1.9.0
  #   container_name: ar-qdrant
  #   ports: ["31012:6333", "31013:6334"]
  #   volumes:
  #     - ${DB_DATA_ROOT:-/home/user/arsim/DB_FG}/qdrant:/qdrant/storage
  #   networks: [autonexusgraph_net]

  # ── 옵션: Redis (분산 worker / queue / 대용량 캐시) ──────────────
  # 단일 worker 단계엔 in-process 캐시로 충분. 추가 시 31014 사용.
  # redis:
  #   image: redis:7-alpine
  #   container_name: ar-redis
  #   ports: ["31014:6379"]
  #   command: ["redis-server", "--appendonly", "yes"]
  #   volumes:
  #     - ${DB_DATA_ROOT:-/home/user/arsim/DB_FG}/redis:/data
  #   networks: [autonexusgraph_net]

networks:
  autonexusgraph_net:
    driver: bridge

  # === ar-poc-network 외부 join (선택) ===
  # dev container 와 컨테이너명으로 통신하려면 위 autonexusgraph_net 대신 아래 external
  # 사용 + 각 service 의 networks 를 [ar-poc-network] 로 변경.
  # ar-poc-network:
  #   external: true
