# FinGraph 3-DB 스택 (Phase 1)
# GPU 의존 컴포넌트 (BGE-M3, BGE-Reranker) 는 후속 PR.
#
# === 사용법 ===
# 전체 기동:       docker compose up -d
# 개별 기동:       docker compose up -d postgres
#                  docker compose up -d neo4j
#                  docker compose up -d qdrant
# 종료:            docker compose down
# 로그:            docker compose logs -f --tail=100 [service]
#
# 상세 가이드:     docs/operations/docker_setup.md
#
# === Port 매핑 정책 ===
# 호스트의 다른 Neo4j/PG/Qdrant 인스턴스와 충돌 방지 위해 외부 포트는 1xxxx 로 forwarding.
#   호스트(외부) 포트  ─→  컨테이너(내부) 포트
#   17474            ─→  7474   (Neo4j HTTP)
#   17687            ─→  7687   (Neo4j Bolt)
#   15432            ─→  5432   (PostgreSQL)
#   16333            ─→  6333   (Qdrant REST)
#   16334            ─→  6334   (Qdrant gRPC)
#   18080            ─→  8080   (BGE-M3 임베딩, 후속)
#   18081            ─→  8081   (BGE-Reranker, 후속)
#
# === 접속 경로 ===
# A) 호스트에서 Python 스크립트:                localhost:1xxxx
# B) 같은 compose 안 다른 서비스:               neo4j:7687 (service name)
# C) 다른 compose의 컨테이너에서 (예: dev컨):    아래 §외부 네트워크 join 참조
#
# === 외부 네트워크 join (dev container 등에서 접근) ===
# 작업환경(dev container)이 별도 compose 의 네트워크 (예: ar-poc-network) 에 있다면,
# 아래 networks 블록을 수정해 external 로 join:
#   networks:
#     default:
#       external: true
#       name: ar-poc-network
# 또는 두 network 모두 join:
#   <service>.networks: [fingraph_net, ar-poc-network]
# 그러면 dev container 에서 'fingraph-postgres:5432' 로 접속 가능 (포트 매핑 불필요).

name: fingraph

services:

  neo4j:
    image: neo4j:5.18-community
    container_name: fingraph-neo4j
    restart: unless-stopped
    ports:
      - "17474:7474"   # HTTP browser  (host:container)
      - "17687:7687"   # Bolt          (host:container)
    environment:
      NEO4J_AUTH: "neo4j/fingraph_dev"
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_heap_initial__size: "512m"
      NEO4J_dbms_memory_heap_max__size: "2g"
      NEO4J_dbms_memory_pagecache_size: "1g"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/var/lib/neo4j/import
      - neo4j_plugins:/plugins
    networks: [fingraph_net]
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:16-alpine
    container_name: fingraph-postgres
    restart: unless-stopped
    ports:
      - "15432:5432"   # host:container
    environment:
      POSTGRES_USER: fingraph
      POSTGRES_PASSWORD: fingraph_dev
      POSTGRES_DB: fingraph
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    networks: [fingraph_net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fingraph -d fingraph"]
      interval: 10s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.9.0
    container_name: fingraph-qdrant
    restart: unless-stopped
    ports:
      - "16333:6333"   # REST  (host:container)
      - "16334:6334"   # gRPC  (host:container)
    volumes:
      - qdrant_data:/qdrant/storage
    networks: [fingraph_net]
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/localhost/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── GPU 의존 컴포넌트 (후속 PR) ────────────────────────────────────
  # bge-m3:
  #   image: ghcr.io/huggingface/text-embeddings-inference:1.2
  #   container_name: fingraph-bge-m3
  #   command: --model-id BAAI/bge-m3 --port 8080
  #   ports: ["18080:8080"]
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - { driver: nvidia, count: 1, capabilities: [gpu] }
  #   networks: [fingraph_net]
  #
  # bge-reranker:
  #   image: ghcr.io/huggingface/text-embeddings-inference:1.2
  #   container_name: fingraph-bge-reranker
  #   command: --model-id BAAI/bge-reranker-v2-m3 --port 8081
  #   ports: ["18081:8081"]
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - { driver: nvidia, count: 1, capabilities: [gpu] }
  #   networks: [fingraph_net]

volumes:
  neo4j_data:
  neo4j_logs:
  neo4j_import:
  neo4j_plugins:
  pg_data:
  qdrant_data:

networks:
  fingraph_net:
    driver: bridge
